name: repo-hygiene

on:
  push:
  pull_request:

jobs:
  large-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Check tracked file sizes
        run: python scripts/check_large_tracked_files.py
