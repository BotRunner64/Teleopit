defaults:
  - robot: g1
  - controller: rl_policy
  - input: pico4
  - _self_

policy_hz: 50.0
transition_duration: 2.0  # seconds to interpolate from default pose to motion command (0.0 to disable)
pause_resume_transition_duration: 1.0  # offline playback resume blend; realtime mocap resumes from re-centered live tracking
pause_resume_warmup_steps: 0  # realtime mocap frames to accumulate before resuming live tracking
input:
  video:
    source: realsense
retarget_buffer_enabled: true
retarget_buffer_window_s: 0.5
retarget_buffer_delay_s: null  # null = auto use one input-frame delay for timeline sampling
realtime_buffer_low_watermark_steps: 2
realtime_buffer_high_watermark_steps: 4
realtime_buffer_warmup_steps: 2
realtime_catchup_enabled: false
realtime_catchup_trigger_steps: 6
realtime_catchup_release_steps: 3
realtime_catchup_target_delay_s: 0.04
reference_qpos_smoothing_alpha: 1.0
reference_velocity_smoothing_alpha: 0.35
reference_anchor_velocity_smoothing_alpha: 0.25
reference_steps: [0]
reference_debug_log: false

# Startup ramp duration (seconds) -- smoothly blend from locked to policy positions
startup_ramp_duration: 2.0
# Joint velocity safety limit (rad/s) -- trigger emergency damping if exceeded
joint_vel_limit: 10.0

# Optional LinkerHand L6 control from Pico controller grip/trigger.
dexterous_hand:
  enabled: false
  hand_joint: L6
  hand_type: both
  left_can: can0
  right_can: can1
  modbus: "None"
  rate: 30.0
  frame_timeout: 0.3
  trigger_deadzone: 0.05
  deadman_threshold: 0.5
  thumb_yaw_center: 10
  speed: [50, 50, 50, 50, 50, 50]
  open_pose: [250, 10, 250, 250, 250, 250]
  close_pose: [79, 10, 0, 0, 0, 0]
  print_input: false

# Physical robot SDK configuration
real_robot:
  network_interface: "eth0"
  # Real-robot PD gains (from mjlab g1_constants.py stiffness/damping, passed directly to SDK — no scaling)
  kp_real: [40.2, 99.1, 40.2, 99.1, 28.5, 28.5,
            40.2, 99.1, 40.2, 99.1, 28.5, 28.5,
            40.2, 28.5, 28.5,
            14.3, 14.3, 14.3, 14.3, 14.3, 16.8, 16.8,
            14.3, 14.3, 14.3, 14.3, 14.3, 16.8, 16.8]
  kd_real: [2.6, 6.3, 2.6, 6.3, 1.8, 1.8,
            2.6, 6.3, 2.6, 6.3, 1.8, 1.8,
            2.6, 1.8, 1.8,
            0.9, 0.9, 0.9, 0.9, 0.9, 1.1, 1.1,
            0.9, 0.9, 0.9, 0.9, 0.9, 1.1, 1.1]
  kd_damping: 8.0      # Damping mode kd
  control_mode: "PR"    # PR=Pitch-Roll ankle mode
  msg_type: "HG"        # HG protocol for G1
  # Joint position limits (from GR00T g1_29dof_gear_wbc.yaml)
  joint_pos_lower: [-2.5307, -0.5236, -2.7576, -0.087267, -0.87267, -0.2618,
                    -2.5307, -2.9671, -2.7576, -0.087267, -0.87267, -0.2618,
                    -2.618, -0.52, -0.52,
                    -3.0892, -1.5882, -2.618, -1.0472,
                    -1.972222054, -1.61443, -1.61443,
                    -3.0892, -2.2515, -2.618, -1.0472,
                    -1.972222054, -1.61443, -1.61443]
  joint_pos_upper: [2.8798, 2.9671, 2.7576, 2.8798, 0.5236, 0.2618,
                    2.8798, 0.5236, 2.7576, 2.8798, 0.5236, 0.2618,
                    2.618, 0.52, 0.52,
                    2.6704, 2.2515, 2.618, 2.0944,
                    1.972222054, 1.61443, 1.61443,
                    2.6704, 1.5882, 2.618, 2.0944,
                    1.972222054, 1.61443, 1.61443]

# Mocap mode switching safety checks
mocap_switch:
  check_frames: 10   # Consecutive valid frames required before switching
  max_position_value: 5.0  # Position sanity threshold (meters)

hydra:
  run:
    dir: .
