defaults:
  - robot: g1
  - controller: motion_tracking_policy
  - input: udp_bvh
  - _self_

policy_hz: 50.0
pd_hz: 200.0
retarget_buffer_enabled: true
retarget_buffer_window_s: 0.5
retarget_buffer_delay_s: 0.1
realtime_buffer_low_watermark_steps: 4
realtime_buffer_high_watermark_steps: 4
realtime_buffer_warmup_steps: 2
reference_velocity_smoothing_alpha: 0.35
reference_anchor_velocity_smoothing_alpha: 0.25
reference_steps: [0, 1, 2, 3, 4, -1, -2, -4, -8, -12, -16]
reference_debug_log: false
viewers: "sim2sim"
realtime: true
num_steps: 0
debug_trace_path: null

hydra:
  run:
    dir: .
