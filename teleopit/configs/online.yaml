defaults:
  - robot: g1
  - controller: rl_policy
  - input: udp_bvh
  - _self_

policy_hz: 50.0
pd_hz: 200.0
realtime_input_delay_s: null  # null = auto use one input-frame delay for realtime interpolation
viewers: "sim2sim"
realtime: true
num_steps: 0          # 0 = infinite loop until Ctrl+C or UDP disconnect
debug_trace_path: null

hydra:
  run:
    dir: .
