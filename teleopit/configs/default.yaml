defaults:
  - robot: g1
  - controller: rl_policy
  - input: bvh
  - _self_

policy_hz: 50.0
pd_hz: 200.0
viewers: "sim2sim"
realtime: false
debug_trace_path: null
playback:
  pause_on_end: false
  keyboard:
    enabled: false

console:
  log_level: warning
  show_timing: false
  timing_log_interval_s: 10.0

hydra:
  run:
    dir: .
