# G1 baseline from unitree_rl_mjlab g1_constants.py (HOME_KEYFRAME).
# Action scale computed as 0.25 * effort_limit / stiffness per actuator.
# Do NOT copy from deploy.yaml (contains known waist_yaw scale error).

num_actions: 29
obs_builder: "mjlab"  # only mjlab is supported for policy inference
# has_state_estimation: omitted — defaults to false in both inference paths.
# Set robot.has_state_estimation=true explicitly only for MuJoCo/sim2sim 160D ONNX.
# Sim2real does not support has_state_estimation=true.

kps: [40.2, 99.1, 40.2, 99.1, 28.5, 28.5,
      40.2, 99.1, 40.2, 99.1, 28.5, 28.5,
      40.2, 28.5, 28.5,
      14.3, 14.3, 14.3, 14.3, 14.3, 16.8, 16.8,
      14.3, 14.3, 14.3, 14.3, 14.3, 16.8, 16.8]

kds: [2.6, 6.3, 2.6, 6.3, 1.8, 1.8,
      2.6, 6.3, 2.6, 6.3, 1.8, 1.8,
      2.6, 1.8, 1.8,
      0.9, 0.9, 0.9, 0.9, 0.9, 1.1, 1.1,
      0.9, 0.9, 0.9, 0.9, 0.9, 1.1, 1.1]

default_angles: [-0.1, 0, 0, 0.3, -0.2, 0,
                 -0.1, 0, 0, 0.3, -0.2, 0,
                 0, 0, 0,
                 0.35, 0.18, 0, 0.87, 0, 0, 0,
                 0.35, -0.18, 0, 0.87, 0, 0, 0]

action_scale: [0.5475, 0.3507, 0.5475, 0.3507, 0.4386, 0.4386,
               0.5475, 0.3507, 0.5475, 0.3507, 0.4386, 0.4386,
               0.5475, 0.4386, 0.4386,
               0.4386, 0.4386, 0.4386, 0.4386, 0.4386, 0.0745, 0.0745,
               0.4386, 0.4386, 0.4386, 0.4386, 0.4386, 0.0745, 0.0745]

torque_limits: [88, 139, 88, 139, 50, 50,
                88, 139, 88, 139, 50, 50,
                88, 50, 50,
                25, 25, 25, 25, 25, 5, 5,
                25, 25, 25, 25, 25, 5, 5]

sim_dt: 0.005

# MuJoCo solver settings (match mjlab training)
solver: "newton"
integrator: "implicitfast"
solver_iterations: 10
ls_iterations: 20

# Use built-in PD actuators matching mjlab training
builtin_pd: true

xml_path: "teleopit/retargeting/gmr/assets/unitree_g1/g1_mjlab.xml"
base_body: "pelvis"

ang_vel_scale: 0.25
dof_pos_scale: 1.0
dof_vel_scale: 0.05
ankle_idx: [4, 5, 10, 11]

mujoco_default_qpos: [0, 0, 0.8,
                      1, 0, 0, 0,
                      -0.1, 0, 0, 0.3, -0.2, 0,
                      -0.1, 0, 0, 0.3, -0.2, 0,
                      0, 0, 0,
                      0.35, 0.18, 0, 0.87, 0, 0, 0,
                      0.35, -0.18, 0, 0.87, 0, 0, 0]
