name: seed
target_fps: 30
preprocess:
  min_frames: 22
  normalize_root_xy: true
  ground_align: none
  max_all_off_ground_s: 2.0
  off_ground_height: 0.2
sources:
  - name: seed_full
    type: seed_csv
    input: data/SEED/g1/csv
    metadata_csv: data/SEED/seed_metadata_v003.csv
    seed_filter_preset: groot_strict
    filters:
      is_mirror: [false]
