name: seed_clean
target_fps: 30
preprocess:
  normalize_root_xy: true
  ground_align: first_frame_foot
  min_frames: 22
sources:
  - name: seed_full
    type: seed_csv
    input: data/SEED/g1/csv
    metadata_csv: data/SEED/seed_metadata_v003.csv
    seed_filter_preset: groot_strict
    filters:
      is_mirror: [false]
