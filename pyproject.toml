[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "teleopit"
version = "0.1.0"
description = "Teleoperation framework for humanoid robots with motion retargeting"
authors = [
    {name = "Teleopit Team"}
]
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
    "mujoco",
    "mink",
    "qpsolvers[proxqp]",
    "torch",
    "scipy",
    "numpy",
    "hydra-core",
    "omegaconf",
    "h5py",
    "onnxruntime",
    "rich",
    "loop-rate-limiters",
    "imageio",
    "matplotlib",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
]
train = [
    "torch>=2.0.0",
    "numpy>=1.20.0",
    "wandb>=0.15.0",
    "tqdm>=4.65.0",
    "pybullet>=3.2.5",
    "termcolor",
    # Isaac Lab dependencies (installed separately via conda/pip)
    # See docs/training.md for Isaac Lab installation instructions
]

[tool.setuptools.packages.find]
where = ["."]
include = ["teleopit*", "teleopit_train*"]
