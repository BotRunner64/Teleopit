hydra:
  run:
    dir: .
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - +num_steps=100
    - +record=true
    - +pd_hz=50
    - +policy_hz=50
    - +input.human_format=bvh_xsens
    - +input.bvh_format=lafan1
    - +controller.action_scale=0
    - +recording.output_path=/inspire/qb-dev/project/robot-action/czxs253130598/home_qbdev/project/teleop_projects/.sisyphus/evidence/task-13-run-sim.h5
  job:
    name: run_sim
    chdir: null
    override_dirname: +controller.action_scale=0,+input.bvh_format=lafan1,+input.human_format=bvh_xsens,+num_steps=100,+pd_hz=50,+policy_hz=50,+record=true,+recording.output_path=/inspire/qb-dev/project/robot-action/czxs253130598/home_qbdev/project/teleop_projects/.sisyphus/evidence/task-13-run-sim.h5
    id: ???
    num: ???
    config_name: default
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /inspire/qb-dev/project/robot-action/czxs253130598/home_qbdev/project/teleop_projects/Teleopit
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /inspire/qb-dev/project/robot-action/czxs253130598/home_qbdev/project/teleop_projects/Teleopit/teleopit/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /inspire/qb-dev/project/robot-action/czxs253130598/home_qbdev/project/teleop_projects/Teleopit
    choices:
      input: bvh
      controller: rl_policy
      robot: g1
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
